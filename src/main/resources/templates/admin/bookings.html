<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('All Bookings')}"></head><body class="admin-body"><div class="admin-layout"><div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div><main class="admin-main"><div class="admin-topbar"><div><span class="section-kicker">Booking Management</span><h1>All Bookings</h1></div></div><section class="admin-card"><div class="table-responsive"><table class="table table-dark table-hover align-middle premium-table"><thead><tr><th>User Mobile</th><th>Movie</th><th>Theater</th><th>Show</th><th>Seats</th><th>Total</th><th>Status</th></tr></thead><tbody><tr th:each="b:${bookings}"><td th:text="${b.user.mobile}"></td><td><strong th:text="${b.show.movie.name}"></strong></td><td th:text="${b.show.theater.name}"></td><td><span th:text="${b.show.showDate}"></span> <span th:text="${b.show.showTime}"></span></td><td th:text="${b.seatsText()}"></td><td>₹<span th:text="${b.totalPrice}"></span></td><td><span class="status-badge" th:text="${b.status}"></span></td></tr></tbody></table></div></section></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}"></script></body></html>
