<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Movie Form')}"></head><body class="admin-body"><div class="admin-layout"><div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div><main class="admin-main"><div class="admin-topbar"><div><span class="section-kicker">Movie Form</span><h1>Add / Edit Movie</h1></div><a class="btn btn-glass" href="/admin/movies"><i class="fa-solid fa-arrow-left"></i> Back</a></div><section class="admin-card"><form method="post" action="/admin/movies/save" th:object="${movie}" class="premium-form"><input type="hidden" th:field="*{id}"><div class="row g-3"><div class="col-md-6"><label>Movie Name</label><input class="form-control" th:field="*{name}" required></div><div class="col-md-3"><label>Language</label><input class="form-control" th:field="*{language}" required></div><div class="col-md-3"><label>Genre</label><input class="form-control" th:field="*{genre}" required></div><div class="col-md-4"><label>Duration</label><input class="form-control" th:field="*{duration}" placeholder="2h 30m" required></div><div class="col-md-4"><label>Release Date</label><input class="form-control" th:field="*{releaseDate}" type="date"></div><div class="col-md-4"><label>Status</label><select class="form-select" th:field="*{status}"><option value="ACTIVE">Active</option><option value="INACTIVE">Inactive</option></select></div><div class="col-12"><label>Poster Image URL</label><input class="form-control" th:field="*{posterImageUrl}"></div><div class="col-12"><label>Description</label><textarea class="form-control" rows="5" th:field="*{description}"></textarea></div></div><button class="btn btn-brand mt-4" type="submit"><i class="fa-solid fa-floppy-disk"></i> Save Movie</button></form></section></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}"></script></body></html>
