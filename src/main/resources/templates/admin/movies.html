<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Manage Movies')}"></head><body class="admin-body"><div class="admin-layout"><div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div><main class="admin-main"><div class="admin-topbar"><div><span class="section-kicker">Movie Management</span><h1>Manage Movies</h1></div><a class="btn btn-brand" href="/admin/movies/new"><i class="fa-solid fa-plus"></i> Add Movie</a></div><div class="alert alert-success" th:if="${success}" th:text="${success}"></div><section class="admin-card"><div class="table-responsive"><table class="table table-dark table-hover align-middle premium-table"><thead><tr><th>Name</th><th>Language</th><th>Genre</th><th>Status</th><th class="text-end">Action</th></tr></thead><tbody><tr th:each="m:${movies}"><td><strong th:text="${m.name}"></strong></td><td th:text="${m.language}"></td><td th:text="${m.genre}"></td><td><span class="status-badge" th:text="${m.status}"></span></td><td class="text-end"><a class="btn btn-glass btn-sm" th:href="@{'/admin/movies/edit/'+${m.id}}">Edit</a> <a class="btn btn-danger btn-sm rounded-pill" onclick="return confirm('Delete movie?')" th:href="@{'/admin/movies/delete/'+${m.id}}">Delete</a></td></tr></tbody></table></div></section></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}"></script></body></html>
