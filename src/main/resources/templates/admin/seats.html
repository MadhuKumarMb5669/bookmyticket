<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Seats')}"></head><body class="admin-body"><div class="admin-layout"><div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div><main class="admin-main"><div class="admin-topbar"><div><span class="section-kicker">Seat Management</span><h1>Generate & View Seats</h1></div></div><div class="alert alert-success" th:if="${success}" th:text="${success}"></div><section class="admin-card mb-4"><form method="get" action="/admin/seats" class="premium-form mb-3"><div class="row g-3 align-items-end"><div class="col-md-8"><label>Select Theater</label><select class="form-select" name="theaterId"><option th:each="t:${theaters}" th:value="${t.id}" th:text="${t.name}"></option></select></div><div class="col-md-4"><button class="btn btn-brand w-100">View Seats</button></div></div></form><form method="post" action="/admin/seats/generate" class="premium-form"><div class="row g-3 align-items-end"><div class="col-md-4"><label>Theater ID</label><input class="form-control" name="theaterId" th:value="${selectedTheaterId}" required></div><div class="col-md-3"><label>Rows</label><input class="form-control" name="rows" type="number" value="6"></div><div class="col-md-3"><label>Columns</label><input class="form-control" name="cols" type="number" value="10"></div><div class="col-md-2"><button class="btn btn-brand w-100">Generate</button></div></div></form></section><section class="admin-card" th:if="${seats!=null}"><div class="screen-wrap"><div class="screen">SCREEN</div></div><div class="seat-grid theater-seat-grid admin-seat-grid"><span class="seat admin-seat" th:each="seat:${seats}" th:text="${seat.seatNumber}"></span></div></section></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}"></script></body></html>
