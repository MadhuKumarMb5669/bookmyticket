<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Shows')}"></head><body class="admin-body"><div class="admin-layout"><div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div><main class="admin-main"><div class="admin-topbar"><div><span class="section-kicker">Show Management</span><h1>Add Show Timing</h1></div></div><div class="alert alert-success" th:if="${success}" th:text="${success}"></div><section class="admin-card mb-4"><form method="post" action="/admin/shows/save" class="premium-form"><div class="row g-3 align-items-end"><div class="col-lg-3"><label>Movie</label><select class="form-select" name="movieId" required><option th:each="m:${movies}" th:value="${m.id}" th:text="${m.name}"></option></select></div><div class="col-lg-3"><label>Theater</label><select class="form-select" name="theaterId" required><option th:each="t:${theaters}" th:value="${t.id}" th:text="${t.name}"></option></select></div><div class="col-lg-2"><label>Date</label><input class="form-control" name="showDate" type="date" required></div><div class="col-lg-2"><label>Time</label><input class="form-control" name="showTime" type="time" required></div><div class="col-lg-1"><label>Price</label><input class="form-control" name="price" type="number" step="0.01" required></div><div class="col-lg-1"><button class="btn btn-brand w-100">Add</button></div></div></form></section><section class="admin-card"><div class="table-responsive"><table class="table table-dark table-hover align-middle premium-table"><thead><tr><th>Movie</th><th>Theater</th><th>Date</th><th>Time</th><th>Price</th></tr></thead><tbody><tr th:each="s:${shows}"><td th:text="${s.movie.name}"></td><td th:text="${s.theater.name}"></td><td th:text="${s.showDate}"></td><td th:text="${s.showTime}"></td><td>₹<span th:text="${s.price}"></span></td></tr></tbody></table></div></section></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}"></script></body></html>
