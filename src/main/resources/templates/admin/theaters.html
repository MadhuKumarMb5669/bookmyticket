<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Theaters')}"></head><body class="admin-body"><div class="admin-layout"><div th:replace="~{fragments/admin-sidebar :: adminSidebar}"></div><main class="admin-main"><div class="admin-topbar"><div><span class="section-kicker">Theater Management</span><h1>Theaters</h1></div></div><div class="alert alert-success" th:if="${success}" th:text="${success}"></div><section class="admin-card mb-4"><form method="post" action="/admin/theaters/save" th:object="${theater}" class="premium-form"><div class="row g-3 align-items-end"><div class="col-md-4"><label>Theater Name</label><input class="form-control" th:field="*{name}" required></div><div class="col-md-3"><label>City</label><input class="form-control" th:field="*{city}" required></div><div class="col-md-3"><label>Address</label><input class="form-control" th:field="*{address}"></div><div class="col-md-2"><button class="btn btn-brand w-100">Save</button></div></div></form></section><section class="admin-card"><div class="table-responsive"><table class="table table-dark table-hover align-middle premium-table"><thead><tr><th>Name</th><th>City</th><th>Address</th></tr></thead><tbody><tr th:each="t:${theaters}"><td><strong th:text="${t.name}"></strong></td><td th:text="${t.city}"></td><td th:text="${t.address}"></td></tr></tbody></table></div></section></main></div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script th:src="@{/js/app.js}"></script></body></html>
