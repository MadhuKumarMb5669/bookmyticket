<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Booking Confirmed')}"></head><body><div th:replace="~{fragments/navbar :: navbar}"></div><main class="container section-space"><section class="ticket-success reveal"><div class="success-icon"><i class="fa-solid fa-circle-check"></i></div><span class="section-kicker">Booking Confirmed</span><h1 th:text="${booking.show.movie.name}">Movie</h1><p class="text-soft">Your ticket has been booked successfully.</p><div class="ticket-card"><div class="ticket-main"><div class="ticket-row"><span>Booking ID</span><strong>#BMT<span th:text="${booking.id}"></span></strong></div><div class="ticket-row"><span>Theater</span><strong th:text="${booking.show.theater.name}"></strong></div><div class="ticket-row"><span>Date & Time</span><strong><span th:text="${booking.show.showDate}"></span> • <span th:text="${booking.show.showTime}"></span></strong></div><div class="ticket-row"><span>Seats</span><strong th:text="${booking.seatsText()}"></strong></div><div class="ticket-row"><span>Total</span><strong>₹<span th:text="${booking.totalPrice}"></span></strong></div></div><div class="qr-box"><i class="fa-solid fa-qrcode"></i><small>Scan at entry</small></div></div><div class="d-flex gap-3 justify-content-center flex-wrap mt-4"><a class="btn btn-brand" href="/user/history">View History</a><button class="btn btn-glass" onclick="window.print()"><i class="fa-solid fa-download"></i> Download Ticket</button></div></section></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
