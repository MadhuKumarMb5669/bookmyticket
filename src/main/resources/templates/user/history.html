<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('My Bookings')}"></head><body><div th:replace="~{fragments/navbar :: navbar}"></div><main class="container section-space"><div class="page-title reveal"><span class="section-kicker">My Bookings</span><h1>Booking History</h1><p>All your confirmed tickets in one premium view.</p></div><div class="booking-grid"><article class="history-ticket reveal" th:each="b:${bookings}"><div class="ticket-strip"><i class="fa-solid fa-ticket"></i></div><div class="history-body"><div class="d-flex justify-content-between gap-3"><div><h3 th:text="${b.show.movie.name}"></h3><p class="text-soft"><span th:text="${b.show.theater.name}"></span> • <span th:text="${b.show.theater.city}"></span></p></div><span class="status-badge" th:text="${b.status}"></span></div><div class="history-meta"><span><i class="fa-regular fa-calendar"></i> <span th:text="${b.bookingDateTime}"></span></span><span><i class="fa-solid fa-chair"></i> <span th:text="${b.seatsText()}"></span></span><span><i class="fa-solid fa-indian-rupee-sign"></i> <span th:text="${b.totalPrice}"></span></span></div><button class="btn btn-glass btn-sm" onclick="window.print()"><i class="fa-solid fa-download"></i> Download Ticket</button></div><div class="qr-mini"><i class="fa-solid fa-qrcode"></i><small>#BMT<span th:text="${b.id}"></span></small></div></article></div></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
