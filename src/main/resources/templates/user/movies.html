<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Movies')}"></head><body><div th:replace="~{fragments/navbar :: navbar}"></div><main class="container section-space"><div class="page-title reveal"><span class="section-kicker">Book Tickets</span><h1>Available Movies</h1><p>Choose your favorite movie and continue to show timings.</p></div><div class="movie-grid"><article class="movie-card reveal" th:each="m:${movies}"><div class="poster-wrap"><img th:src="${m.posterImageUrl}" alt="Movie poster"><span class="rating-badge"><i class="fa-solid fa-star"></i> 4.8</span></div><div class="movie-body"><h3 th:text="${m.name}"></h3><p class="movie-desc" th:text="${m.description}"></p><div class="movie-meta"><span th:text="${m.language}"></span><span th:text="${m.genre}"></span><span th:text="${m.duration}"></span></div><div class="movie-footer"><span class="release"><i class="fa-regular fa-calendar"></i> <span th:text="${m.releaseDate}"></span></span><a class="btn btn-brand btn-sm" th:href="@{'/user/movie/'+${m.id}+'/shows'}">Select Movie</a></div></div></article></div></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
