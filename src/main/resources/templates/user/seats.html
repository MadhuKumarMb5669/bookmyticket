<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Select Seats')}"></head><body><div th:replace="~{fragments/navbar :: navbar}"></div><main class="container section-space"><div class="seat-page-grid"><section class="seat-panel reveal"><span class="section-kicker">Seat Selection</span><h1 th:text="${show.movie.name}">Movie</h1><p class="text-soft"><span th:text="${show.theater.name}"></span> • <span th:text="${show.showDate}"></span> • <span th:text="${show.showTime}"></span></p><div class="alert alert-danger" th:if="${error}" th:text="${error}"></div><form method="post" action="/user/book" id="bookingForm"><input type="hidden" name="showId" th:value="${show.id}"><input type="hidden" id="seatPrice" th:value="${show.price}"><div class="screen-wrap"><div class="screen-glow"></div><div class="screen">SCREEN THIS WAY</div></div><div class="seat-grid theater-seat-grid"><label th:each="seat:${seats}" th:class="${booked.contains(seat.seatNumber)} ? 'seat booked' : (${#strings.startsWith(seat.seatNumber,'A') || #strings.startsWith(seat.seatNumber,'B')} ? 'seat vip' : 'seat')"><input type="checkbox" name="selectedSeats" th:value="${seat.seatNumber}" th:disabled="${booked.contains(seat.seatNumber)}"><span th:text="${seat.seatNumber}"></span></label></div><div class="seat-legend"><span><i class="legend-box available"></i> Available</span><span><i class="legend-box selected"></i> Selected</span><span><i class="legend-box booked"></i> Booked</span><span><i class="legend-box vip"></i> VIP</span></div></form></section><aside class="booking-summary reveal"><h3>Booking Summary</h3><div class="summary-movie"><strong th:text="${show.movie.name}"></strong><span th:text="${show.theater.name}"></span></div><div class="summary-row"><span>Date</span><strong th:text="${show.showDate}"></strong></div><div class="summary-row"><span>Time</span><strong th:text="${show.showTime}"></strong></div><div class="summary-row"><span>Price / Seat</span><strong>₹<span th:text="${show.price}"></span></strong></div><div class="selected-output"><span>Selected Seats</span><strong id="selectedSeatText">None</strong></div><div class="summary-total"><span>Total</span><strong>₹<span id="totalPrice">0</span></strong></div><button class="btn btn-brand w-100 btn-lg" form="bookingForm" type="submit"><i class="fa-solid fa-ticket"></i> Confirm Booking</button><p class="summary-note"><i class="fa-solid fa-circle-info"></i> Booked seats cannot be selected again.</p></aside></div></main><div th:replace="~{fragments/footer :: footer}"></div><script th:src="@{/js/seats.js}"></script></body></html>
