<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head th:replace="~{fragments/head :: head('Shows')}"></head><body><div th:replace="~{fragments/navbar :: navbar}"></div><main class="container section-space"><div class="movie-show-header reveal"><div><span class="section-kicker">Show Timings</span><h1 th:text="${movie.name}">Movie</h1><p class="text-soft" th:text="${movie.language+' • '+movie.genre+' • '+movie.duration}"></p></div><a href="/user/movies" class="btn btn-glass"><i class="fa-solid fa-arrow-left"></i> Movies</a></div><div class="show-list reveal"><div class="show-card" th:each="s:${shows}"><div class="show-icon"><i class="fa-solid fa-building"></i></div><div class="show-info"><h4 th:text="${s.theater.name}"></h4><p><i class="fa-solid fa-location-dot"></i> <span th:text="${s.theater.city}"></span> • <span th:text="${s.theater.address}"></span></p></div><div class="show-date"><strong th:text="${s.showDate}"></strong><span th:text="${s.showTime}"></span></div><div class="show-price">₹<span th:text="${s.price}"></span></div><a class="btn btn-brand" th:href="@{'/user/show/'+${s.id}+'/seats'}">Select Seats</a></div></div></main><div th:replace="~{fragments/footer :: footer}"></div></body></html>
